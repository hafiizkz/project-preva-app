name: preva_app
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  image_picker: ^1.1.2
  provider: ^6.1.5+1
  intl: ^0.20.2
  geolocator: ^13.0.1
  google_maps_flutter: ^2.9.0
  url_launcher: ^6.3.0
  uuid: ^4.5.0
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - lib/img/logo.png
    - lib/img/logo2.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo3.png"
